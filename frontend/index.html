<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glass Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/frontend/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-card" aria-label="Chat application">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Realtime Room</p>
            <h1>Glass Chat</h1>
          </div>
          <div class="header-right">
            <button id="clearChatBtn" class="clear-btn" title="Clear all messages">
              <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6h14zM10 11v6M14 11v6"/>
              </svg>
            </button>
            <span id="statusBadge" class="status connecting">Connecting...</span>
            <div class="participants-panel">
              <div class="participants-title">Online</div>
              <ul id="participantsList" class="participants-list"></ul>
            </div>
          </div>
        </header>

        <div id="presenceBanner" class="presence-banner hidden"></div>
        <ul id="messageList" class="message-list" aria-live="polite"></ul>

        <form id="messageForm" class="message-form" autocomplete="off">
          <div class="input-stack">
            <div class="input-row">
              <button type="button" id="emojiToggle" class="icon-btn" aria-label="Toggle emoji picker">
                <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M8.4 14.3c.9 1.2 2.1 1.8 3.6 1.8s2.7-.6 3.6-1.8" />
                  <circle cx="9.2" cy="10.2" r="1" />
                  <circle cx="14.8" cy="10.2" r="1" />
                </svg>
              </button>
              <label for="fileInput" class="icon-btn" aria-label="Upload file">
                <svg class="icon-glyph" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21.4 11.5l-8.9 8.9a6 6 0 0 1-8.5-8.5l9.6-9.6a4.2 4.2 0 0 1 6 6l-9.8 9.8a2.4 2.4 0 1 1-3.4-3.4l9.1-9.1" />
                </svg>
              </label>
              <input id="fileInput" type="file" hidden />
              <input
                id="messageInput"
                type="text"
                maxlength="1000"
                placeholder="Type your message..."
              />
              <button type="submit" id="sendButton">Send</button>
            </div>
            <div id="emojiPicker" class="emoji-picker hidden"></div>
            <div id="uploadStatus" class="upload-status hidden"></div>
          </div>
        </form>
      </section>
    </main>

    <section id="usernameModal" class="modal-backdrop" aria-modal="true" role="dialog">
      <div class="modal-card">
        <h2>Join the chat</h2>
        <p>Choose a username to start messaging in real time.</p>
        <form id="usernameForm" class="username-form">
          <input
            id="usernameInput"
            type="text"
            maxlength="24"
            placeholder="Your username"
            required
            autofocus
          />
          <button type="submit">Enter Room</button>
        </form>
      </div>
    </section>

    <dialog id="editModal" class="app-dialog">
      <form id="editForm" method="dialog" class="modal-card modal-compact dialog-content username-form">
        <h2>Edit message</h2>
        <input id="editInput" type="text" maxlength="1000" required />
        <div class="dialog-actions">
          <button type="button" id="editCancelBtn" class="secondary-btn">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </dialog>

    <dialog id="deleteModal" class="app-dialog">
      <div class="modal-card modal-compact dialog-content">
        <h2>Delete message?</h2>
        <p>This action cannot be undone.</p>
        <div class="dialog-actions">
          <button type="button" id="deleteCancelBtn" class="secondary-btn">Cancel</button>
          <button type="button" id="deleteConfirmBtn" class="danger-btn">Delete</button>
        </div>
      </div>
    </dialog>

    <div id="confirmDialog" class="confirm-dialog hidden">
      <div class="confirm-tag">
        <div class="confirm-content">
          <p id="confirmMessage"></p>
          <div class="confirm-actions">
            <button id="confirmOk" class="confirm-btn ok">OK</button>
            <button id="confirmCancel" class="confirm-btn cancel">Скасувати</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/frontend/app.js"></script>
  </body>
</html>
